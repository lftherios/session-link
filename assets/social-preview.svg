<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" fill="#f5f6f3"/>
  <rect x="0" y="0" width="1280" height="6" fill="#0e6f5c"/>

  <!-- left column: wordmark, hero line, sub, command -->
  <g transform="translate(84, 140)">
    <text font-family="Menlo, monospace" font-size="30">
      <tspan fill="#17201c" font-family="Palatino, Georgia, serif" font-style="italic" font-size="36">session</tspan><tspan fill="#0e6f5c">.link</tspan>
    </text>

    <text y="120" font-family="Palatino, Georgia, serif" font-weight="500" font-size="68" fill="#17201c" letter-spacing="-1">
      <tspan x="0">Every session</tspan>
      <tspan x="0" dy="80">deserves a <tspan fill="#0e6f5c" font-style="italic">URL.</tspan></tspan>
    </text>

    <text y="300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="23" fill="#5b6660">
      <tspan x="0">Turn any LLM session — an eval item, an agent trace,</tspan>
      <tspan x="0" dy="33">a one-off completion — into a permanent, shareable</tspan>
      <tspan x="0" dy="33">URL you can inspect.</tspan>
    </text>

    <g transform="translate(0, 400)">
      <rect width="572" height="54" rx="10" fill="#101613"/>
      <text x="24" y="34" font-family="Menlo, monospace" font-size="19" xml:space="preserve"><tspan fill="#8fa39a">$ </tspan><tspan fill="#dfe6e2">npx </tspan><tspan fill="#57c9a6">session.link</tspan><tspan fill="#dfe6e2"> dev -- python agent.py</tspan></text>
    </g>
  </g>

  <!-- right column: a shared-session card (mirrors the hosted runcard) -->
  <g transform="translate(752, 176)">
    <rect width="444" height="292" rx="16" fill="#fdfdfb" stroke="#d8ddd7" stroke-width="1"/>
    <g transform="translate(26, 34)">
      <text font-family="Menlo, monospace" font-size="12.5" fill="#5b6660">session.link/r/9f3kx2mvq7wt · unlisted</text>
      <text y="42" font-family="Palatino, Georgia, serif" font-size="27" fill="#17201c">math-agent / q117</text>

      <!-- chips -->
      <g transform="translate(0, 62)" font-family="Menlo, monospace" font-size="12.5">
        <rect width="86" height="27" rx="13.5" fill="none" stroke="#0e6f5c" stroke-opacity="0.4"/><text x="14" y="18.5" fill="#0e6f5c">correct ✓</text>
        <g transform="translate(96,0)"><rect width="80" height="27" rx="13.5" fill="none" stroke="#d8ddd7"/><text x="13" y="18.5" fill="#5b6660">1,593 tok</text></g>
        <g transform="translate(186,0)"><rect width="72" height="27" rx="13.5" fill="none" stroke="#d8ddd7"/><text x="13" y="18.5" fill="#5b6660">$0.0092</text></g>
        <g transform="translate(268,0)"><rect width="58" height="27" rx="13.5" fill="none" stroke="#d8ddd7"/><text x="12" y="18.5" fill="#5b6660">4.18s</text></g>
      </g>

      <!-- timing waterfall -->
      <g transform="translate(0, 116)" font-family="Menlo, monospace" font-size="12.5" fill="#5b6660">
        <!-- row: dot, label, track(x220 w150 h5), bar, dur -->
        <g>
          <rect x="0" y="4" width="9" height="9" rx="2" fill="#5b4b8a"/><text x="18" y="12">math-agent</text>
          <rect x="220" y="5" width="150" height="5" rx="2.5" fill="#eef1ec"/><rect x="220" y="5" width="150" height="5" rx="2.5" fill="#5b4b8a"/><text x="392" y="12">4.18s</text>
        </g>
        <g transform="translate(0, 30)">
          <rect x="0" y="4" width="9" height="9" rx="2" fill="#0e6f5c"/><text x="30" y="12">plan-and-act</text>
          <rect x="220" y="5" width="150" height="5" rx="2.5" fill="#eef1ec"/><rect x="222" y="5" width="66" height="5" rx="2.5" fill="#0e6f5c"/><text x="392" y="12">1.85s</text>
        </g>
        <g transform="translate(0, 60)">
          <rect x="0" y="4" width="9" height="9" rx="2" fill="#a16418"/><text x="30" y="12">calculator</text>
          <rect x="220" y="5" width="150" height="5" rx="2.5" fill="#eef1ec"/><rect x="288" y="5" width="4" height="5" rx="2" fill="#a16418"/><text x="392" y="12">20ms</text>
        </g>
        <g transform="translate(0, 90)">
          <rect x="0" y="4" width="9" height="9" rx="2" fill="#0e6f5c"/><text x="30" y="12">final-answer</text>
          <rect x="220" y="5" width="150" height="5" rx="2.5" fill="#eef1ec"/><rect x="293" y="5" width="77" height="5" rx="2.5" fill="#0e6f5c"/><text x="392" y="12">2.15s</text>
        </g>
      </g>
    </g>
  </g>

</svg>
