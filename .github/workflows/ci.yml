name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: for f in cli/*.mjs scripts/*.mjs packages/format/*.mjs; do node --check "$f"; done
      - run: npm test
      - run: npm run validate
      - run: npm run build:cli
