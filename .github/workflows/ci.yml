name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: for f in scripts/*.mjs packages/format/*.mjs; do node --check "$f"; done
      - run: npm test
      # The Go-migration parity oracle: goldens must match the JS reference.
      - run: node scripts/golden.mjs --check
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: npm ci
      # golden emits the drift-checked artifacts the Go build embeds
      - run: npm run build:viewer && node scripts/golden.mjs --check
      - run: cd go && go vet ./... && go test ./...
      # Build-smoke the npm binary channel (cross-compile all targets; no publish).
      - run: node scripts/build-npm.mjs 0.0.0-ci
      - run: npm run validate
