name: release

# Tag a version (e.g. `git tag v0.3.1 && git push --tags`) to publish any
# @session-link/* library whose version isn't on npm yet. Each package.json
# version is the source of truth: bump the ones you changed, then tag —
# unchanged packages are skipped, not re-published.
#
# As of the Go cutover (v0.3.0): the CLI is `session.link` on npm as the Go
# LAUNCHER, published by release-go.yml's binary-channel step — NOT here.
# The standalone binaries come from goreleaser (release-go.yml), not the old
# Bun build. This workflow only ships the format + viewer libraries.
on:
  push:
    tags: ["v*"]

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # format before viewer (viewer depends on it). Publish each only if its
      # version isn't already on the registry. session.link is deliberately
      # NOT here — the Go launcher owns that name now (release-go.yml).
      - name: publish changed libraries
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          published=0
          for dir in packages/format packages/viewer; do
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            if [ -n "$(npm view "$name@$ver" version 2>/dev/null)" ]; then
              echo "skip $name@$ver (already on npm)"
            else
              echo "publishing $name@$ver"
              npm publish --workspace "$name" --access public
              published=$((published + 1))
            fi
          done
          echo "published $published package(s)"
